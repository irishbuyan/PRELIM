<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MyPremiumSite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 min-h-screen flex items-center justify-center">

    <!-- Login Card -->
    <div class="bg-white/20 backdrop-blur-lg shadow-2xl rounded-3xl p-10 w-full max-w-md text-white border border-white/30">

        <!-- Title -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold">Welcome Back 👋</h2>
            <p class="text-sm text-gray-200 mt-2">Login to access your dashboard</p>
        </div>

        <!-- Error Message -->
        {% if error %}
            <div class="bg-red-500/80 text-white text-sm p-3 rounded-lg mb-4 text-center">
                {{ error }}
            </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-5">
                <label class="block mb-2 text-sm font-medium">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 rounded-xl bg-white/30 placeholder-gray-200 text-white focus:outline-none focus:ring-2 focus:ring-white"
                    placeholder="Enter your username">
            </div>

            <!-- Password -->
            <div class="mb-6">
                <label class="block mb-2 text-sm font-medium">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl bg-white/30 placeholder-gray-200 text-white focus:outline-none focus:ring-2 focus:ring-white"
                    placeholder="Enter your password">
            </div>

            <!-- Login Button -->
            <button type="submit"
                class="w-full bg-white text-indigo-600 font-semibold py-3 rounded-xl shadow-lg hover:scale-105 transform transition duration-300">
                Login
            </button>
        </form>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="{% url 'home' %}" class="text-sm text-gray-200 hover:text-white transition">
                ← Back to Home
            </a>
        </div>

    </div>

</body>
</html>
